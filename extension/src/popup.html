<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="card">
    <header>
      <div class="logo-container">🚀</div>
      <div>
        <h1>Career Compass AI <span>Browser Scraper</span></h1>
      </div>
    </header>

    <div id="alert-success" class="alert alert-success"></div>
    <div id="alert-error" class="alert alert-danger"></div>

    <div id="capture-section">
      <button id="btn-extract" class="btn">
        <span id="spinner-extract" class="loading-spinner" style="display: none;"></span>
        Extract Job Details
      </button>
    </div>

    <div id="edit-form">
      <div class="form-group">
        <label for="input-title">Job Title</label>
        <input type="text" id="input-title" placeholder="e.g. Senior Software Engineer">
      </div>
      <div class="form-group">
        <label for="input-company">Company</label>
        <input type="text" id="input-company" placeholder="e.g. Acme Corp">
      </div>
      <div class="form-group">
        <label for="input-url">Job URL</label>
        <input type="text" id="input-url" placeholder="Posting URL">
      </div>
      <div class="form-group">
        <label for="input-description">Job Description</label>
        <textarea id="input-description" placeholder="Paste or verify description..."></textarea>
      </div>

      <button id="btn-claude" class="btn" style="background: #D97757; color: white; margin-bottom: 10px;">
        <span id="spinner-claude" class="loading-spinner" style="display: none;"></span>
        Send to Claude AI
      </button>
      <button id="btn-save" class="btn">
        <span id="spinner-save" class="loading-spinner" style="display: none;"></span>
        Save to Tracker
      </button>
      <button id="btn-reset" class="btn btn-secondary">Reset</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
